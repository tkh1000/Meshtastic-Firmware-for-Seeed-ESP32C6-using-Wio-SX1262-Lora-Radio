# PlatformIO Configuration
# Seeed Studio XIAO ESP32-C6 + Wio-SX1262 LoRa Module
#
# This environment builds Meshtastic firmware for the compact Seeed XIAO ESP32-C6
# paired with the Wio-SX1262 LoRa module (SPI-based SX1262 chip).
#
# Build: pio run -e seeed_xiao_esp32c6_wio_sx1262
# Upload: pio run -e seeed_xiao_esp32c6_wio_sx1262 --target upload
# Monitor: pio device monitor -e seeed_xiao_esp32c6_wio_sx1262

[env:seed_xiao_esp32c6_wio_sx1262]

# ============================================
# PLATFORM AND BOARD CONFIGURATION
# ============================================

platform = espressif32 @ ^6.7.0
board = esp32-c6-devkitc-1
framework = arduino

# MCU Settings
board_build.mcu = esp32c6
board_build.f_cpu = 160000000L          # 160 MHz core frequency
board_build.f_flash = 40000000L         # 40 MHz SPI flash
board_build.flash_mode = dio            # Dual I/O
board_build.flash_size = 4MB            # XIAO has 4MB

# ============================================
# BUILD FLAGS & COMPILER OPTIONS
# ============================================

build_flags = 
    # Board Identification
    -D BOARD_MODEL=\"Seeed_XIAO_ESP32C6_Wio_SX1262\"
    -D VARIANT_NAME=\"seeed_xiao_esp32c6_wio_sx1262\"
    -D HW_VENDOR=VENDOR_SEEED
    
    # LoRa Radio: SX1262 on Wio module (SPI interface)
    -D USE_SX1262
    -D LORA_INTERFACE_TYPE=LORA_SPI    # SPI, not UART!
    -D LORA_SPI_NUM=SPI1                # Primary SPI bus
    
    # SPI Pins (XIAO Standard Pinout)
    -D LORA_SCK_PIN=8                   # D8 = GPIO8
    -D LORA_MOSI_PIN=10                 # D10 = GPIO10
    -D LORA_MISO_PIN=9                  # D9 = GPIO9
    -D LORA_CS_PIN=3                    # D3 = GPIO3 (Chip Select)
    
    # LoRa Control Pins
    -D LORA_RESET_PIN=4                 # D4 = GPIO4
    -D LORA_DIO1_PIN=5                  # D5 = GPIO5 (interrupt)
    -D LORA_BUSY_PIN=6                  # D6 = GPIO6 (busy flag)
    
    # SPI Configuration
    -D LORA_SPI_SPEED=5000000           # 5 MHz SPI clock
    -D LORA_SPI_MODE=SPI_MODE0          # SX1262 uses SPI mode 0
    
    # Frequency Band (choose one)
    -D FREQ_US=915.0                    # Americas (915 MHz) - default
    # -D FREQ_EU=868.0                  # Europe (868 MHz)
    # -D FREQ_CN=470.0                  # China (470 MHz)
    -D DEFAULT_FREQ=915.0
    
    # TX Power
    -D LORA_TX_POWER=20                 # 20 dBm (100mW)
    
    # Power Management
    -D BATTERY_SENSE_PIN=A0             # Analog input for battery
    -D BATTERY_SENSE_RESOLUTION=3       # 12-bit ADC
    -D BATTERY_SENSE_MULTIPLIER=2.0     # Voltage divider scaling
    -D BATTERY_TYPE=BAT_LIPO            # LiPo battery
    -D CHARGE_CURRENT=100               # mA (XIAO has built-in charging)
    
    # GPIO Pins
    -D LED_PIN=2                        # Built-in LED
    -D LED_INVERTED=1                   # Active low
    -D BUTTON_PIN=1                     # User button (if connected)
    -D BUTTON_INVERTED=1                # Active low
    
    # Wireless Features
    -D WANT_BLUETOOTH=1                 # BLE 5.3
    -D WANT_WIFI=1                      # WiFi 6 (disabled by default for power)
    -D WIFI_ENABLED_BY_DEFAULT=0
    -D BT_DEVICE_NAME=\"Meshtastic-XIAO-C6\"
    
    # Memory
    -D RAM_SIZE=NORMAL
    
    # Logging
    -D LOG_DEBUG_ENABLED=1
    -D USE_LOG_TIMESTAMPS=1
    
    # Optimization
    -O2
    -Wno-unused-but-set-variable
    -Wno-format-nonliteral

# ============================================
# PARTITION TABLE & STORAGE
# ============================================

# XIAO has 4MB flash with default partition scheme
board_build.partitions = default.csv

# ============================================
# LIBRARY DEPENDENCIES
# ============================================

lib_deps = 
    ${common.lib_deps}

# ============================================
# SERIAL MONITOR & DEBUG
# ============================================

monitor_speed = 115200
monitor_filters = 
    esp32_exception_decoder
    time
    default

upload_speed = 921600
monitor_port = /dev/ttyUSB0             # Change if needed

# ============================================
# UPLOAD & DEBUG CONFIGURATION
# ============================================

# For serial upload (simplest method - no external hardware needed)
upload_protocol = esptool

# For JTAG debugging (advanced - requires ESP-PROG or similar)
# upload_protocol = esp-prog
# debug_tool = esp-prog
# debug_speed = 20000

# ============================================
# XIAO ESP32-C6 PIN SUMMARY
# ============================================

# Pin Assignments for Meshtastic + Wio-SX1262:
#
# XIAO Pin  ESP32 GPIO  Usage
# ────────────────────────────────────────
# D0        GPIO0       General GPIO / RTC
# D1        GPIO1       UART TX (Serial)
# D2        GPIO2       General GPIO
# D3        GPIO3       SPI CS (LoRa chip select)
# D4        GPIO4       LoRa RESET (active low pulse)
# D5        GPIO5       LoRa DIO1 (interrupt, data ready)
# D6        GPIO6       LoRa BUSY (module busy flag)
# D7        GPIO7       General GPIO
# D8        GPIO8       SPI SCK (clock)
# D9        GPIO9       SPI MISO (data in)
# D10       GPIO10      SPI MOSI (data out)
# GND       GND         Ground
# 5V        5V          USB 5V (input)
# 3V3       3V3         3.3V regulated (output, 700mA max)
# A0-A3     GPIO3-6     Analog inputs
# Bat       Battery     Battery connector (3.7V LiPo)

# ============================================
# WIO-SX1262 PIN CONNECTIONS
# ============================================

# Wio-SX1262    XIAO ESP32-C6
# ──────────────────────────────
# VCC      ←→  3V3
# GND      ←→  GND
# NSS      ←→  D3  (GPIO3)
# SCK      ←→  D8  (GPIO8)
# MOSI     ←→  D10 (GPIO10)
# MISO     ←→  D9  (GPIO9)
# RST      ←→  D4  (GPIO4)
# DIO1     ←→  D5  (GPIO5)
# BUSY     ←→  D6  (GPIO6)
# ANT      ←→  U.FL antenna

# ============================================
# QUICK START COMMANDS
# ============================================

# First time setup:
#   pio run -e seeed_xiao_esp32c6_wio_sx1262 --target clean
#   pio run -e seeed_xiao_esp32c6_wio_sx1262

# Build and upload:
#   pio run -e seeed_xiao_esp32c6_wio_sx1262 --target upload

# Monitor serial output:
#   pio device monitor -e seeed_xiao_esp32c6_wio_sx1262 -b 115200

# List available ports:
#   pio device list

# ============================================
# TROUBLESHOOTING
# ============================================

# If upload fails:
# 1. Check USB cable is data-capable (not power-only)
# 2. Ensure device is detected: pio device list
# 3. Try different upload speed: upload_speed = 115200
# 4. Hold RST button while uploading
# 5. Try full erase: esptool.py ... erase_flash

# If LoRa doesn't work:
# 1. Verify SPI pins match (SCK, MOSI, MISO, CS)
# 2. Check Wio-SX1262 has 3.3V power (measure with multimeter)
# 3. Verify antenna is connected to ANT port
# 4. Try monitor at 115200 to see boot messages
# 5. Check LORA_RESET_PIN pulse with oscilloscope

# If Bluetooth won't pair:
# 1. Full power cycle (unplug USB 10 seconds)
# 2. Forget device in phone Bluetooth settings
# 3. Clear Meshtastic app cache and rescan
# 4. Check BLE is enabled: WANT_BLUETOOTH=1

# ============================================
# BUILD OUTPUT LOCATIONS
# ============================================

# Compiled files are at:
#   .pio/build/seeed_xiao_esp32c6_wio_sx1262/firmware.bin
#   .pio/build/seeed_xiao_esp32c6_wio_sx1262/firmware.elf

# Manual flash with esptool:
#   esptool.py --chip esp32c6 --port /dev/ttyUSB0 \
#     write_flash -z 0x0 \
#     .pio/build/seeed_xiao_esp32c6_wio_sx1262/firmware.bin

# ============================================
# NOTES
# ============================================

# - XIAO ESP32-C6 is the smallest ESP32-C6 board available
# - Wio-SX1262 is a plug-and-play LoRa module for XIAO boards
# - Both support official Meshtastic firmware
# - SPI interface is faster and more reliable than UART for LoRa
# - Built-in battery charging on XIAO simplifies power management
# - WiFi 6 + BLE 5.3 enable many connectivity options
# - Total power consumption can be very low in sleep modes
