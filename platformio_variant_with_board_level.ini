# platformio.ini for Seeed XIAO ESP32-C6 + Wio-SX1262
# 
# Location: firmware/variants/esp32c6/seeed_xiao_wio_sx1262/platformio.ini
#
# This file configures PlatformIO to build the firmware for the Seeed XIAO ESP32-C6
# paired with the Wio-SX1262 LoRa module. It includes CI metadata so the build
# system automatically detects and builds this variant in GitHub Actions.

[env:seeed_xiao_wio_sx1262]

# ============================================
# CI/BUILD SYSTEM METADATA
# ============================================
# board_level determines CI treatment:
#   0 = Community/DIY - builds in CI but NOT in releases
#   1 = Full support - builds + appears in web flasher + in releases
#   2 = Special/Experimental - special CI treatment
#
# Set to 0 for DIY community variant (recommended)
board_level = 0

# Platform and board selection
platform = espressif32 @ ^6.7.0
board = esp32-c6-devkitc-1
framework = arduino

# MCU specific settings
board_build.mcu = esp32c6
board_build.f_cpu = 160000000L
board_build.f_flash = 40000000L
board_build.flash_mode = dio
board_build.flash_size = 4MB

# ============================================
# BUILD FLAGS FOR SEEED XIAO ESP32-C6 + WIO-SX1262
# ============================================

build_flags = 
    # Board identification
    -D BOARD_MODEL=\"Seeed_XIAO_ESP32C6_Wio_SX1262\"
    -D VARIANT_NAME=\"seeed_xiao_wio_sx1262\"
    -D HW_VENDOR=VENDOR_SEEED
    
    # LoRa Radio: SX1262 on Wio module (SPI interface)
    -D USE_SX1262
    -D LORA_INTERFACE_TYPE=LORA_SPI
    -D LORA_SPI_NUM=SPI1
    
    # SPI Pins (XIAO Standard Pinout)
    -D LORA_SCK_PIN=8
    -D LORA_MOSI_PIN=10
    -D LORA_MISO_PIN=9
    -D LORA_CS_PIN=3
    
    # LoRa Control Pins
    -D LORA_RESET_PIN=4
    -D LORA_DIO1_PIN=5
    -D LORA_BUSY_PIN=6
    
    # SPI Configuration
    -D LORA_SPI_SPEED=5000000
    -D LORA_SPI_MODE=SPI_MODE0
    
    # Frequency Band
    -D FREQ_US=915.0
    -D DEFAULT_FREQ=915.0
    
    # TX Power
    -D LORA_TX_POWER=20
    
    # Power Management
    -D BATTERY_SENSE_PIN=A0
    -D BATTERY_SENSE_RESOLUTION=3
    -D BATTERY_SENSE_MULTIPLIER=2.0
    -D BATTERY_TYPE=BAT_LIPO
    -D CHARGE_CURRENT=100
    
    # GPIO Pins
    -D LED_PIN=2
    -D LED_INVERTED=1
    -D BUTTON_PIN=1
    -D BUTTON_INVERTED=1
    
    # Wireless Features
    -D WANT_BLUETOOTH=1
    -D WANT_WIFI=1
    -D WIFI_ENABLED_BY_DEFAULT=0
    -D BT_DEVICE_NAME=\"Meshtastic-XIAO-C6\"
    
    # Memory and Logging
    -D RAM_SIZE=NORMAL
    -D LOG_DEBUG_ENABLED=1
    -D USE_LOG_TIMESTAMPS=1
    
    # Optimization
    -O2
    -Wno-unused-but-set-variable
    -Wno-format-nonliteral

# ============================================
# PARTITION TABLE
# ============================================
board_build.partitions = default.csv

# ============================================
# DEPENDENCIES
# ============================================
lib_deps = 
    ${common.lib_deps}

# ============================================
# SERIAL MONITOR & DEBUG
# ============================================
monitor_speed = 115200
monitor_filters = 
    esp32_exception_decoder
    time
    default

upload_speed = 921600
upload_protocol = esptool

# ============================================
# EXTENSIONS / EXTRAS (Optional)
# ============================================
# Uncomment to extend the base configuration:
# extra_configs = 
#     variants/esp32c6/seeed_xiao_wio_sx1262/platformio_extra.ini

# ============================================
# END SEEED XIAO ESP32-C6 + WIO-SX1262 CONFIG
# ============================================
