name: Build Meshtastic Firmware

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Clone Meshtastic
        run: |
          git clone --depth 1 https://github.com/meshtastic/firmware.git
          cd firmware
          git submodule update --init --recursive

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Create variant directory
        run: mkdir -p firmware/variants/esp32c6/seeed_xiao_wio_sx1262

      - name: Copy variant.h
        run: cp variant_seeed_xiao_esp32c6_wio_sx1262.h firmware/variants/esp32c6/seeed_xiao_wio_sx1262/variant.h

      - name: Copy platformio.ini
        run: cp platformio_seeed_xiao_esp32c6_wio_sx1262.ini firmware/variants/esp32c6/seeed_xiao_wio_sx1262/platformio.ini

      - name: Add SPI pins to variant.h
        run: |
          cat >> firmware/variants/esp32c6/seeed_xiao_wio_sx1262/variant.h << 'EOF'
          
          // SPI pins for Wio-SX1262
          #define USE_SX1262
          #define LORA_MOSI 10
          #define LORA_MISO 9
          #define LORA_SCK 8
          #define LORA_DIO1 5
          #define LORA_RESET 4
          #define LORA_CS 3
          #define LORA_BUSY 6
          EOF

      - name: Build
        working-directory: firmware
        run: pio run -e seeed_xiao_wio_sx1262

      - name: Collect artifacts
        run: |
          mkdir -p output
          BUILD="firmware/.pio/build/seeed_xiao_wio_sx1262"
          cp "$BUILD/bootloader.bin" output/ 2>/dev/null || true
          cp "$BUILD/partitions.bin" output/ 2>/dev/null || true
          cp "$BUILD/firmware.bin" output/ || exit 1
          ls -lh output/

      - name: Create manifest
        run: |
          cat > output/manifest.json << 'EOF'
          {"name":"Meshtastic","version":"2.7.15","new_install_prompt_erase":true,"builds":[{"chipFamily":"ESP32-C6","parts":[{"path":"bootloader.bin","offset":0},{"path":"partitions.bin","offset":32768},{"path":"firmware.bin","offset":65536}]}]}
          EOF

      - name: Zip artifacts
        run: cd output && zip -r ../meshtastic-seeed-xiao-c6-wio-sx1262.zip .

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: meshtastic-seeed-xiao-c6-wio-sx1262
          path: meshtastic-seeed-xiao-c6-wio-sx1262.zip
          retention-days: 30

      - name: Done
        run: echo "✓ Build complete - download from artifacts"
