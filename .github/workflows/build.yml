name: Build Meshtastic Firmware

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:

      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Checkout Meshtastic firmware
        uses: actions/checkout@v4
        with:
          repository: meshtastic/firmware
          ref: master
          submodules: recursive
          fetch-depth: 0
          path: firmware

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            firmware/.pio
          key: pio-${{ runner.os }}-${{ hashFiles('firmware/platformio.ini') }}
          restore-keys: pio-${{ runner.os }}-

      - name: Install PlatformIO
        run: pip install platformio

      - name: Create variant directory
        run: |
          mkdir -p firmware/variants/esp32c6/seeed_xiao_wio_sx1262

      - name: Copy variant.h
        run: |
          cp variant_seeed_xiao_esp32c6_wio_sx1262.h \
             firmware/variants/esp32c6/seeed_xiao_wio_sx1262/variant.h

      - name: Copy platformio.ini
        run: |
          cp platformio_seeed_xiao_esp32c6_wio_sx1262.ini \
             firmware/variants/esp32c6/seeed_xiao_wio_sx1262/platformio.ini

      - name: Find and patch variant
        run: |
          VARIANT="firmware/variants/esp32c6/seeed_xiao_wio_sx1262/variant.h"
          echo "Patching: $VARIANT"
          python3 patch_variant.py "$VARIANT"
          head -50 "$VARIANT"

      - name: Build firmware
        working-directory: firmware
        run: pio run -e seeed_xiao_wio_sx1262

      - name: List build outputs
        run: find firmware/.pio/build/seeed_xiao_wio_sx1262 -type f | sort

      - name: Copy binaries
        run: |
          mkdir -p package
          BUILD="firmware/.pio/build/seeed_xiao_wio_sx1262"
          
          # Copy bootloader if exists
          if [ -f "$BUILD/bootloader.bin" ]; then
            cp "$BUILD/bootloader.bin" package/bootloader.bin
            echo "✓ bootloader.bin"
          fi
          
          # Copy partitions if exists
          if [ -f "$BUILD/partitions.bin" ]; then
            cp "$BUILD/partitions.bin" package/partitions.bin
            echo "✓ partitions.bin"
          fi
          
          # Find and copy firmware.bin
          FW=$(find "$BUILD" -name "firmware.bin" | head -1)
          if [ -z "$FW" ]; then
            FW=$(find "$BUILD" -name "*.bin" ! -name "bootloader.bin" ! -name "partitions.bin" | head -1)
          fi
          
          if [ -n "$FW" ]; then
            cp "$FW" package/firmware.bin
            echo "✓ firmware.bin ($(stat -c%s package/firmware.bin 2>/dev/null || stat -f%z package/firmware.bin) bytes)"
          else
            echo "✗ No firmware.bin found!"
            exit 1
          fi
          
          ls -lh package/

      - name: Write manifest
        run: |
          MANIFEST='{
            "name":"Meshtastic",
            "version":"2.7.15",
            "new_install_prompt_erase":true,
            "builds":[{
              "chipFamily":"ESP32-C6",
              "parts":[
                {"path":"bootloader.bin","offset":0},
                {"path":"partitions.bin","offset":32768},
                {"path":"firmware.bin","offset":65536}
              ]
            }]
          }'
          echo "$MANIFEST" > package/manifest.json
          cat package/manifest.json

      - name: Zip package
        working-directory: package
        run: zip ../meshtastic-seeed-xiao-c6-wio-sx1262.zip *.bin manifest.json

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: meshtastic-seeed-xiao-c6-wio-sx1262
          path: meshtastic-seeed-xiao-c6-wio-sx1262.zip
          retention-days: 30

      - name: Build Summary
        if: always()
        run: |
          echo "========================================" 
          echo "Build Complete"
          echo "========================================"
          echo ""
          echo "Download: meshtastic-seeed-xiao-c6-wio-sx1262.zip"
          echo ""
          echo "Files in package:"
          ls -lh package/
          echo ""
          echo "To flash:"
          echo "  esptool.py --chip esp32c6 --port /dev/ttyUSB0 \\"
          echo "    write_flash 0x0 firmware.bin"
